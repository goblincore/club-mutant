version: '3.8'

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
      - youtube-api
      - dream-npc
      - image-upload

  server:
    build:
      context: ../..
      dockerfile: Dockerfile.server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=2567
      - YOUTUBE_SERVICE_URL=http://youtube-api:8081
      - DREAM_NPC_SERVICE_URL=http://dream-npc:4000
    expose:
      - '2567'

  youtube-api:
    build:
      context: ../../services
      dockerfile: youtube-api/Dockerfile
    restart: unless-stopped
    environment:
      - PORT=8081
      - YOUTUBE_API_CACHE_TTL=3600
      - VIDEO_CACHE_SIZE_MB=1000
      - PROXY_URL=${PROXY_URL}
      - POT_PROVIDER_URL=http://pot-provider:4416
      - YOUTUBE_COOKIES=${YOUTUBE_COOKIES}
      - USE_RUSTY_YTDL=${USE_RUSTY_YTDL:-false}
    expose:
      - '8081'
    depends_on:
      - pot-provider

  dream-npc:
    build:
      context: ../../services/dream-npc
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=4000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    expose:
      - '4000'

  image-upload:
    build:
      context: ../../services/image-upload
    restart: unless-stopped
    environment:
      - PORT=4001
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=club-mutant-images
      - R2_PUBLIC_URL=https://cdn.mutante.club
    expose:
      - '4001'

  pot-provider:
    image: ghcr.io/jim60105/bgutil-pot:latest
    restart: unless-stopped
    expose:
      - '4416'

volumes:
  caddy_data:
  caddy_config:
