version: '3.8'

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
      - youtube-api
      - dream-npc
      - image-upload
      - nakama

  server:
    build:
      context: ../..
      dockerfile: Dockerfile.server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=2567
      - YOUTUBE_SERVICE_URL=http://youtube-api:8081
      - DREAM_NPC_SERVICE_URL=http://dream-npc:4000
      - NAKAMA_ENCRYPTION_KEY=${NAKAMA_ENCRYPTION_KEY}
    expose:
      - '2567'

  youtube-api:
    build:
      context: ../../services
      dockerfile: youtube-api/Dockerfile
    restart: unless-stopped
    environment:
      - PORT=8081
      - YOUTUBE_API_CACHE_TTL=3600
      - VIDEO_CACHE_SIZE_MB=1000
      - PROXY_URL=${PROXY_URL}
      - POT_PROVIDER_URL=http://pot-provider:4416
    volumes:
      - ./cookies.txt:/etc/youtube-api/cookies.txt:ro
    expose:
      - '8081'
    depends_on:
      - pot-provider

  dream-npc:
    build:
      context: ../../services/dream-npc-go
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=4000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MEM0_API_KEY=${MEM0_API_KEY}
    expose:
      - '4000'

  image-upload:
    build:
      context: ../../services/image-upload
    restart: unless-stopped
    environment:
      - PORT=4001
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=club-mutant-images
      - R2_PUBLIC_URL=https://cdn.mutante.club
    expose:
      - '4001'

  pot-provider:
    image: ghcr.io/jim60105/bgutil-pot:latest
    restart: unless-stopped
    expose:
      - '4416'

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=nakama
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - '5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 10

  nakama:
    image: heroiclabs/nakama:3.24.2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        /nakama/nakama migrate up --database.address=postgres:${POSTGRES_PASSWORD}@postgres:5432/nakama &&
        exec /nakama/nakama \
          --database.address=postgres:${POSTGRES_PASSWORD}@postgres:5432/nakama \
          --socket.server_key=${NAKAMA_SERVER_KEY} \
          --session.encryption_key=${NAKAMA_ENCRYPTION_KEY} \
          --session.token_expiry_sec=7200 \
          --session.refresh_token_expiry_sec=2592000 \
          --console.username=${NAKAMA_CONSOLE_USERNAME} \
          --console.password=${NAKAMA_CONSOLE_PASSWORD}
    expose:
      - '7350'
      - '7351'

volumes:
  caddy_data:
  caddy_config:
  pgdata:
