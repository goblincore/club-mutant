<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="rustGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B7410E"/>
      <stop offset="100%" style="stop-color:#8B4513"/>
    </linearGradient>
    <linearGradient id="slimeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9ACD32"/>
      <stop offset="100%" style="stop-color:#556B2F"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="2" y="2" width="44" height="44" rx="4" fill="#0a0a0a" stroke="#2F4F4F" stroke-width="2"/>
  <!-- Calendar header -->
  <rect x="8" y="10" width="32" height="8" rx="1" fill="url(#rustGrad)" stroke="#B7410E" stroke-width="1"/>
  <!-- Binder rings -->
  <rect x="14" y="7" width="2" height="6" fill="#C0C0C0"/>
  <rect x="32" y="7" width="2" height="6" fill="#C0C0C0"/>
  <!-- Calendar body -->
  <rect x="8" y="18" width="32" height="20" fill="#1a1a1a" stroke="#2F4F4F" stroke-width="1"/>
  <!-- Grid cells -->
  <rect x="11" y="21" width="6" height="5" fill="url(#slimeGrad)" opacity="0.5"/>
  <rect x="21" y="21" width="6" height="5" fill="url(#slimeGrad)" opacity="0.5"/>
  <rect x="31" y="21" width="6" height="5" fill="url(#slimeGrad)" opacity="0.5"/>
  <rect x="11" y="29" width="6" height="5" fill="url(#slimeGrad)" opacity="0.5"/>
  <rect x="31" y="29" width="6" height="5" fill="url(#slimeGrad)" opacity="0.5"/>
  <!-- Marked day: rot spot -->
  <circle cx="24" cy="31.5" r="3.5" fill="url(#rustGrad)" stroke="#9ACD32" stroke-width="1"/>
  <!-- Corner accents -->
  <rect x="4" y="4" width="6" height="2" fill="#B7410E"/>
  <rect x="38" y="42" width="6" height="2" fill="#9ACD32"/>
</svg>
