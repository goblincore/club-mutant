<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="rustGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B7410E"/>
      <stop offset="100%" style="stop-color:#8B4513"/>
    </linearGradient>
    <linearGradient id="slimeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9ACD32"/>
      <stop offset="100%" style="stop-color:#556B2F"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="2" y="2" width="44" height="44" rx="4" fill="#0a0a0a" stroke="#2F4F4F" stroke-width="2"/>
  <!-- ICQ-style flower: 8 petals, alternating slime/rust -->
  <circle cx="24" cy="13" r="5" fill="url(#slimeGrad)" stroke="#9ACD32" stroke-width="1"/>
  <circle cx="32" cy="16" r="5" fill="url(#rustGrad)" stroke="#B7410E" stroke-width="1"/>
  <circle cx="35" cy="24" r="5" fill="url(#slimeGrad)" stroke="#9ACD32" stroke-width="1"/>
  <circle cx="32" cy="32" r="5" fill="url(#rustGrad)" stroke="#B7410E" stroke-width="1"/>
  <circle cx="24" cy="35" r="5" fill="url(#slimeGrad)" stroke="#9ACD32" stroke-width="1"/>
  <circle cx="16" cy="32" r="5" fill="url(#rustGrad)" stroke="#B7410E" stroke-width="1"/>
  <circle cx="13" cy="24" r="5" fill="url(#slimeGrad)" stroke="#9ACD32" stroke-width="1"/>
  <circle cx="16" cy="16" r="5" fill="url(#rustGrad)" stroke="#B7410E" stroke-width="1"/>
  <!-- Center eye -->
  <circle cx="24" cy="24" r="6" fill="#0a0a0a" stroke="#2F4F4F" stroke-width="1"/>
  <circle cx="24" cy="24" r="3" fill="url(#rustGrad)"/>
  <circle cx="24" cy="24" r="1.2" fill="#0a0a0a"/>
  <!-- Corner accents -->
  <rect x="4" y="4" width="6" height="2" fill="#B7410E"/>
  <rect x="38" y="42" width="6" height="2" fill="#9ACD32"/>
</svg>
