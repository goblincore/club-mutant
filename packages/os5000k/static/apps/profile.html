<!DOCTYPE html>
<html>
<head>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #fff;
  color: #222;
  font-family: arial, sans-serif;
  font-size: 13px;
  height: 100vh;
  overflow-y: auto;
}

/* ── Toolbar ────────────────────────────────── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 8px;
  background: linear-gradient(#f0f0f0, #ddd);
  border-bottom: 1px solid #bbb;
  min-height: 30px;
}
.toolbar-title {
  font-weight: bold;
  font-size: 13px;
  color: #222;
}

/* ── Profile card ───────────────────────────── */
.profile-card { padding: 14px; }
.header { display: flex; align-items: center; margin-bottom: 14px; gap: 12px; }
.avatar {
  width: 52px;
  height: 52px;
  border-radius: 6px;
  background: #eee;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  color: #999;
  overflow: hidden;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.header-info { flex: 1; }
.username { color: #44f; font-size: 15px; font-weight: bold; }
.display-name { color: #666; font-size: 12px; margin-top: 1px; }

.field { margin-bottom: 10px; }
.field-label {
  color: #999;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}
.field-value { color: #222; line-height: 1.4; word-break: break-word; }
.field-value a { color: #44f; text-decoration: none; }
.field-value a:hover { text-decoration: underline; }

.divider { border-top: 1px solid #ddd; margin: 14px 0; }

/* ── Lookup ─────────────────────────────────── */
.lookup-section { padding: 0 14px 14px; }
.lookup-title { font-weight: bold; font-size: 13px; color: #222; margin-bottom: 8px; }
.lookup-row { display: flex; gap: 6px; }
.lookup-row input {
  flex: 1;
  border: 1px solid #ccc;
  background: #fff;
  color: #222;
  padding: 5px 8px;
  font-family: arial, sans-serif;
  font-size: 12px;
  outline: none;
  border-radius: 2px;
}
.lookup-row input:focus { border-color: #88f; }
.btn {
  background: linear-gradient(#f8f8f8, #ddd);
  border: 1px solid #aaa;
  border-radius: 2px;
  color: #333;
  padding: 4px 12px;
  cursor: pointer;
  font-family: arial, sans-serif;
  font-size: 12px;
}
.btn:hover { background: linear-gradient(#fff, #e8e8ff); border-color: #88f; }
.btn-back {
  background: none;
  border: none;
  color: #44f;
  cursor: pointer;
  font-family: arial, sans-serif;
  font-size: 12px;
  padding: 2px 4px;
}
.btn-back:hover { text-decoration: underline; }

.error { color: #c00; margin-top: 8px; font-size: 12px; }
.loading { color: #999; font-style: italic; padding: 20px; text-align: center; }
</style>
</head>
<body>

<div class="toolbar">
  <span class="toolbar-title">👤 Profile</span>
</div>

<div id="app">
  <div class="loading">Loading profile...</div>
</div>

<script>
var app = document.getElementById('app');
var selfUserId = null;

function renderProfile(profile, isSelf) {
  var html = '';

  if (!isSelf) {
    html += '<div style="padding:8px 14px 0"><button class="btn-back" onclick="loadSelf()">\u2190 Back to my profile</button></div>';
  }

  html += '<div class="profile-card">';
  html += '<div class="header">';
  if (profile.avatarUrl) {
    html += '<div class="avatar"><img src="' + esc(profile.avatarUrl) + '" onerror="this.parentNode.innerHTML=\'👤\'"></div>';
  } else {
    html += '<div class="avatar">' + (isSelf ? '👤' : '🔍') + '</div>';
  }
  html += '<div class="header-info">';
  html += '<div class="username">@' + esc(profile.username || '???') + '</div>';
  if (profile.displayName) {
    html += '<div class="display-name">' + esc(profile.displayName) + '</div>';
  }
  html += '</div></div>';

  if (profile.bio) {
    html += '<div class="field"><div class="field-label">Bio</div><div class="field-value">' + esc(profile.bio) + '</div></div>';
  }
  if (profile.favoriteSong) {
    html += '<div class="field"><div class="field-label">Favorite Song</div><div class="field-value">' + esc(profile.favoriteSong) + '</div></div>';
  }
  if (profile.links && profile.links.length > 0) {
    html += '<div class="field"><div class="field-label">Links</div><div class="field-value">';
    for (var i = 0; i < profile.links.length; i++) {
      var link = profile.links[i];
      html += '<div><a href="' + esc(link.url) + '" target="_blank">' + esc(link.label) + '</a></div>';
    }
    html += '</div></div>';
  }
  html += '</div>';

  html += '<div class="divider"></div>';
  html += '<div class="lookup-section">';
  html += '<div class="lookup-title">Look Up Player</div>';
  html += '<div class="lookup-row">';
  html += '<input id="lookupInput" placeholder="Enter user ID..." onkeydown="if(event.key===\'Enter\')lookupUser()">';
  html += '<button class="btn" onclick="lookupUser()">Look Up</button>';
  html += '</div>';
  html += '<div id="lookupError"></div>';
  html += '</div>';

  app.innerHTML = html;
}

function loadSelf() {
  if (!OS5000k) { app.innerHTML = '<div class="error" style="padding:14px">Bridge not available. Are you logged in?</div>'; return; }
  app.innerHTML = '<div class="loading">Loading profile...</div>';
  OS5000k.getProfile().then(function (profile) {
    selfUserId = profile.userId;
    renderProfile(profile, true);
  }).catch(function (err) {
    app.innerHTML = '<div class="error" style="padding:14px">Failed to load profile: ' + esc(err.message) + '</div>';
  });
}

function lookupUser() {
  var input = document.getElementById('lookupInput');
  var userId = input.value.trim();
  if (!userId) return;

  var errEl = document.getElementById('lookupError');
  errEl.innerHTML = '<div class="loading" style="padding:8px 0">Looking up...</div>';

  OS5000k.getUserProfile(userId).then(function (profile) {
    renderProfile(profile, false);
  }).catch(function (err) {
    errEl.innerHTML = '<div class="error">Not found: ' + esc(err.message) + '</div>';
  });
}

function esc(str) {
  var div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

// Wait for bridge
function waitForBridge() {
  if (typeof OS5000k !== 'undefined') {
    loadSelf();
  } else {
    var attempts = 0;
    var check = setInterval(function () {
      attempts++;
      if (typeof OS5000k !== 'undefined') {
        clearInterval(check);
        loadSelf();
      } else if (attempts > 50) {
        clearInterval(check);
        app.innerHTML = '<div class="error" style="padding:14px">Not logged in. Profile requires authentication.</div>';
      }
    }, 100);
  }
}
waitForBridge();
</script>
</body>
</html>
