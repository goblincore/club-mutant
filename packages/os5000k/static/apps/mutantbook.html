<!DOCTYPE html>
<html>
<head>
<script src="../os5k-components.js"></script>
<style>
/* ── MutantBook theme overrides ──────────────── */
.mb-header {
  background: #3b5998;
  padding: 10px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
  border-bottom: 1px solid #29487d;
}
.mb-header .os5k-avatar {
  border: 2px solid #fff;
  background: #8b9dc3;
  color: #fff;
}
.mb-header-info { flex: 1; color: #fff; }
.mb-header-name { font-size: 16px; font-weight: bold; }
.mb-header-stats { font-size: 11px; opacity: 0.8; margin-top: 2px; }
.mb-header-bio { font-size: 11px; opacity: 0.7; margin-top: 4px; font-style: italic; }
.mb-header-actions { margin-top: 6px; }
.mb-header-btn {
  background: #4267B2;
  border: 1px solid #29487d;
  color: #fff;
  padding: 2px 8px;
  font-size: 10px;
  border-radius: 2px;
  cursor: pointer;
  font-family: inherit;
}
.mb-header-btn:hover { background: #5b83db; }

/* ── Tabs override ────────────────────────────── */
.mb-tabs {
  background: #d8dfea;
  border-bottom: 1px solid #3b5998;
  display: flex;
  padding: 0;
}
.mb-tab {
  padding: 5px 12px;
  color: #3b5998;
  font-size: 11px;
  cursor: pointer;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  font-family: inherit;
}
.mb-tab:hover { background: #c8cfda; }
.mb-tab.active {
  background: #fff;
  border: 1px solid #3b5998;
  border-bottom: 1px solid #fff;
  margin-bottom: -1px;
  font-weight: bold;
}

/* ── Wall ─────────────────────────────────────── */
.mb-wall { padding: 8px; }
.mb-compose {
  background: #fff;
  border: 1px solid #dddfe2;
  padding: 8px;
  margin-bottom: 8px;
  border-radius: 2px;
}
.mb-compose textarea {
  width: 100%;
  border: 1px solid #bdc7d8;
  background: #f6f7f8;
  padding: 6px;
  font-family: inherit;
  font-size: 12px;
  border-radius: 2px;
  resize: none;
  height: 48px;
  outline: none;
  box-sizing: border-box;
}
.mb-compose textarea:focus { border-color: #3b5998; background: #fff; }
.mb-compose-actions { text-align: right; margin-top: 6px; }
.mb-compose-btn {
  background: #5b74a8;
  color: #fff;
  padding: 3px 10px;
  font-size: 11px;
  border: 1px solid #29447e;
  border-radius: 2px;
  cursor: pointer;
  font-family: inherit;
}
.mb-compose-btn:hover { background: #6d8bc4; }
.mb-compose-btn:disabled { opacity: 0.5; cursor: default; }

.mb-post {
  background: #fff;
  border: 1px solid #dddfe2;
  padding: 8px;
  margin-bottom: 6px;
  border-radius: 2px;
  display: flex;
  gap: 6px;
  align-items: flex-start;
}
.mb-post .os5k-avatar { background: #8b9dc3; color: #fff; }
.mb-post-body { flex: 1; min-width: 0; }
.mb-post-author { font-size: 12px; color: #3b5998; font-weight: bold; cursor: pointer; }
.mb-post-author:hover { text-decoration: underline; }
.mb-post-content { font-size: 12px; margin-top: 4px; color: #333; line-height: 1.4; word-break: break-word; white-space: pre-wrap; }
.mb-post-meta { font-size: 10px; color: #90949c; margin-top: 4px; display: flex; gap: 8px; align-items: center; }
.mb-post-delete { color: #cd201f; cursor: pointer; font-size: 10px; border: none; background: none; font-family: inherit; }
.mb-post-delete:hover { text-decoration: underline; }

/* ── Info tab ─────────────────────────────────── */
.mb-info { padding: 12px; }
.mb-info-field { margin-bottom: 10px; }
.mb-info-label { color: #90949c; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.mb-info-value { color: #1c1e21; line-height: 1.4; word-break: break-word; }
.mb-info-value a { color: #3b5998; text-decoration: none; }
.mb-info-value a:hover { text-decoration: underline; }

/* ── Friends tab ──────────────────────────────── */
.mb-friends { padding: 8px; display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 6px; }
.mb-friend-card {
  background: #fff;
  border: 1px solid #dddfe2;
  border-radius: 2px;
  padding: 8px;
  text-align: center;
  cursor: pointer;
}
.mb-friend-card:hover { background: #f0f0ff; }
.mb-friend-card .os5k-avatar { margin: 0 auto 4px; background: #8b9dc3; color: #fff; }
.mb-friend-name { font-size: 11px; color: #3b5998; font-weight: bold; }
.mb-friend-status { font-size: 10px; }
.mb-friend-status.online { color: #0a0; }
.mb-friend-status.offline { color: #999; }

/* ── Lookup ───────────────────────────────────── */
.mb-lookup {
  padding: 8px;
  background: #fff;
  border-bottom: 1px solid #dddfe2;
  display: flex;
  gap: 4px;
}
.mb-lookup input {
  flex: 1;
  border: 1px solid #bdc7d8;
  padding: 4px 6px;
  font-family: inherit;
  font-size: 11px;
  border-radius: 2px;
  outline: none;
}
.mb-lookup input:focus { border-color: #3b5998; }
.mb-lookup button {
  background: #5b74a8;
  color: #fff;
  border: 1px solid #29447e;
  padding: 2px 8px;
  font-size: 10px;
  border-radius: 2px;
  cursor: pointer;
  font-family: inherit;
}
</style>
</head>
<body>
<div id="app" style="display:flex;flex-direction:column;height:100vh;overflow:hidden;">
  <div class="os5k-loading">Loading MutantBook...</div>
</div>

<script>
var app = document.getElementById('app');
var bridge = null;
var selfUserId = null;
var selfUsername = null;
var currentProfileId = null;
var currentProfileData = null;
var currentTab = 'wall';
var wallPosts = [];
var wallCursor = null;

OS5kApp.init('mutantbook', function (b) {
  bridge = b;
  if (!bridge) {
    app.innerHTML = '<div class="os5k-auth-gate">Log in to use MutantBook.</div>';
    return;
  }
  bridge.getProfile().then(function (profile) {
    selfUserId = profile.userId;
    selfUsername = profile.username;
    loadProfile(selfUserId);
  }).catch(function () {
    app.innerHTML = '<div class="os5k-error">Failed to load profile.</div>';
  });
});

function loadProfile(userId) {
  currentProfileId = userId;
  currentTab = 'wall';
  wallPosts = [];
  wallCursor = null;
  app.innerHTML = '<div class="os5k-loading">Loading profile...</div>';

  bridge.getUserProfile(userId).then(function (profile) {
    currentProfileData = profile;
    renderPage();
    loadWallPosts();
  }).catch(function (err) {
    app.innerHTML = '<div class="os5k-error">User not found: ' + OS5kApp.esc(err.message) + '</div>';
  });
}

function renderPage() {
  var p = currentProfileData;
  var isSelf = currentProfileId === selfUserId;
  var html = '';

  // Lookup bar
  html += '<div class="mb-lookup">';
  if (!isSelf) {
    html += '<button onclick="loadProfile(\'' + OS5kApp.esc(selfUserId) + '\')" style="background:none;border:none;color:#3b5998;cursor:pointer;font-family:inherit;font-size:11px;">&larr; My Profile</button>';
  }
  html += '<input id="lookupInput" placeholder="Search user by ID..." onkeydown="if(event.key===\'Enter\')doLookup()">';
  html += '<button onclick="doLookup()">Go</button>';
  html += '</div>';

  // Profile header
  html += '<div class="mb-header">';
  html += '<div class="os5k-avatar" style="width:70px;height:70px;font-size:28px;border-radius:2px;">';
  if (p.avatarUrl) {
    html += '<img src="' + OS5kApp.esc(p.avatarUrl) + '" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentNode.textContent=\'😃\'">';
  } else {
    html += (p.username || '?').charAt(0).toUpperCase();
  }
  html += '</div>';
  html += '<div class="mb-header-info">';
  html += '<div class="mb-header-name">' + OS5kApp.esc(p.displayName || p.username || '???') + '</div>';
  html += '<div class="mb-header-stats">' + OS5kApp.esc('@' + (p.username || '???')) + '</div>';
  if (p.bio) html += '<div class="mb-header-bio">"' + OS5kApp.esc(p.bio) + '"</div>';
  if (!isSelf) {
    html += '<div class="mb-header-actions">';
    html += '<button class="mb-header-btn" onclick="doAddFriend(\'' + OS5kApp.esc(currentProfileId) + '\')">+ Add Friend</button>';
    html += '</div>';
  }
  html += '</div></div>';

  // Tabs
  html += '<div class="mb-tabs">';
  html += '<button class="mb-tab' + (currentTab === 'wall' ? ' active' : '') + '" onclick="switchTab(\'wall\')">Wall</button>';
  html += '<button class="mb-tab' + (currentTab === 'info' ? ' active' : '') + '" onclick="switchTab(\'info\')">Info</button>';
  html += '<button class="mb-tab' + (currentTab === 'friends' ? ' active' : '') + '" onclick="switchTab(\'friends\')">Friends</button>';
  html += '</div>';

  // Content
  html += '<div class="os5k-content" id="tabContent" style="flex:1;overflow-y:auto;background:#e9ebee;"></div>';

  app.innerHTML = html;
  renderTab();
}

function switchTab(tab) {
  currentTab = tab;
  // Update tab active state
  var tabs = document.querySelectorAll('.mb-tab');
  for (var i = 0; i < tabs.length; i++) {
    var t = tabs[i];
    var tabName = t.textContent.toLowerCase().trim();
    t.className = 'mb-tab' + (tabName === tab ? ' active' : '');
  }
  renderTab();
  if (tab === 'wall' && wallPosts.length === 0) loadWallPosts();
  if (tab === 'friends') loadFriendsTab();
}

function renderTab() {
  var tc = document.getElementById('tabContent');
  if (!tc) return;

  if (currentTab === 'wall') {
    renderWall(tc);
  } else if (currentTab === 'info') {
    renderInfo(tc);
  } else if (currentTab === 'friends') {
    tc.innerHTML = '<div class="os5k-loading">Loading friends...</div>';
  }
}

function renderWall(container) {
  var html = '<div class="mb-wall">';

  // Compose box (only if logged in)
  if (selfUserId) {
    var placeholder = currentProfileId === selfUserId
      ? 'What\'s on your mind?'
      : 'Write something on ' + OS5kApp.esc(currentProfileData.displayName || currentProfileData.username) + '\'s wall...';
    html += '<div class="mb-compose">';
    html += '<textarea id="composeText" placeholder="' + placeholder + '"></textarea>';
    html += '<div class="mb-compose-actions">';
    html += '<button class="mb-compose-btn" onclick="doPost()" id="postBtn">Post</button>';
    html += '</div></div>';
  }

  // Posts
  if (wallPosts.length === 0) {
    html += '<div style="text-align:center;color:#90949c;font-style:italic;padding:30px;">No wall posts yet.</div>';
  } else {
    for (var i = 0; i < wallPosts.length; i++) {
      var post = wallPosts[i];
      html += renderPost(post);
    }
  }

  // Load more
  if (wallCursor) {
    html += '<div style="text-align:center;padding:8px;">';
    html += '<button class="mb-compose-btn" onclick="loadMorePosts()" id="loadMoreBtn">Load More</button>';
    html += '</div>';
  }

  html += '</div>';
  container.innerHTML = html;
}

function renderPost(post) {
  var initial = (post.authorUsername || '?').charAt(0).toUpperCase();
  var isMine = post.authorId === selfUserId;
  var html = '<div class="mb-post">';
  html += '<div class="os5k-avatar" style="width:32px;height:32px;font-size:14px;border-radius:2px;">' + initial + '</div>';
  html += '<div class="mb-post-body">';
  html += '<span class="mb-post-author" onclick="loadProfile(\'' + OS5kApp.esc(post.authorId) + '\')">' + OS5kApp.esc(post.authorUsername || 'Unknown') + '</span>';
  html += '<div class="mb-post-content">' + OS5kApp.esc(post.content) + '</div>';
  html += '<div class="mb-post-meta">';
  html += '<span>' + OS5kApp.timeAgo(post.createdAt) + '</span>';
  if (isMine) {
    html += '<button class="mb-post-delete" onclick="doDelete(\'' + OS5kApp.esc(post.postId) + '\')">Delete</button>';
  }
  html += '</div></div></div>';
  return html;
}

function renderInfo(container) {
  var p = currentProfileData;
  var html = '<div class="mb-info">';

  if (p.bio) {
    html += '<div class="mb-info-field"><div class="mb-info-label">Bio</div>';
    html += '<div class="mb-info-value">' + OS5kApp.esc(p.bio) + '</div></div>';
  }
  if (p.favoriteSong) {
    html += '<div class="mb-info-field"><div class="mb-info-label">Favorite Song</div>';
    html += '<div class="mb-info-value">' + OS5kApp.esc(p.favoriteSong) + '</div></div>';
  }
  if (p.links && p.links.length > 0) {
    html += '<div class="mb-info-field"><div class="mb-info-label">Links</div><div class="mb-info-value">';
    for (var i = 0; i < p.links.length; i++) {
      html += '<div><a href="' + OS5kApp.esc(p.links[i].url) + '" target="_blank">' + OS5kApp.esc(p.links[i].label) + '</a></div>';
    }
    html += '</div></div>';
  }

  if (!p.bio && !p.favoriteSong && (!p.links || p.links.length === 0)) {
    html += '<div style="color:#90949c;font-style:italic;">No info yet.</div>';
  }

  html += '</div>';
  container.innerHTML = html;
}

function loadFriendsTab() {
  bridge.getFriends(0).then(function (result) {
    var friends = result.friends || [];
    var tc = document.getElementById('tabContent');
    if (!tc) return;
    if (friends.length === 0) {
      tc.innerHTML = '<div style="color:#90949c;font-style:italic;text-align:center;padding:30px;">No friends yet.</div>';
      return;
    }
    var html = '<div class="mb-friends">';
    for (var i = 0; i < friends.length; i++) {
      var f = friends[i];
      var initial = (f.username || '?').charAt(0).toUpperCase();
      html += '<div class="mb-friend-card" onclick="loadProfile(\'' + OS5kApp.esc(f.userId) + '\')">';
      html += '<div class="os5k-avatar" style="width:40px;height:40px;font-size:18px;border-radius:2px;">' + initial + '</div>';
      html += '<div class="mb-friend-name">' + OS5kApp.esc(f.displayName || f.username) + '</div>';
      html += '<div class="mb-friend-status ' + (f.online ? 'online' : 'offline') + '">' + (f.online ? 'Online' : 'Offline') + '</div>';
      html += '</div>';
    }
    html += '</div>';
    tc.innerHTML = html;
  }).catch(function (err) {
    var tc = document.getElementById('tabContent');
    if (tc) tc.innerHTML = '<div class="os5k-error">Failed to load friends: ' + OS5kApp.esc(err.message) + '</div>';
  });
}

function loadWallPosts() {
  bridge.getWallPosts(currentProfileId).then(function (result) {
    wallPosts = result.posts || [];
    wallCursor = result.cursor || null;
    var tc = document.getElementById('tabContent');
    if (tc && currentTab === 'wall') renderWall(tc);
  }).catch(function (err) {
    var tc = document.getElementById('tabContent');
    if (tc) tc.innerHTML = '<div class="os5k-error">Failed to load wall: ' + OS5kApp.esc(err.message) + '</div>';
  });
}

function loadMorePosts() {
  var btn = document.getElementById('loadMoreBtn');
  if (btn) { btn.textContent = 'Loading...'; btn.disabled = true; }

  bridge.getWallPosts(currentProfileId, wallCursor).then(function (result) {
    var newPosts = result.posts || [];
    wallPosts = wallPosts.concat(newPosts);
    wallCursor = result.cursor || null;
    var tc = document.getElementById('tabContent');
    if (tc && currentTab === 'wall') renderWall(tc);
  }).catch(function (err) {
    if (btn) { btn.textContent = 'Load More'; btn.disabled = false; }
  });
}

function doPost() {
  var textarea = document.getElementById('composeText');
  var content = textarea ? textarea.value.trim() : '';
  if (!content) return;

  var btn = document.getElementById('postBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Posting...'; }

  bridge.createWallPost(currentProfileId, content).then(function (post) {
    wallPosts.unshift(post);
    var tc = document.getElementById('tabContent');
    if (tc && currentTab === 'wall') renderWall(tc);
  }).catch(function (err) {
    alert('Failed to post: ' + err.message);
    if (btn) { btn.disabled = false; btn.textContent = 'Post'; }
  });
}

function doDelete(postId) {
  if (!confirm('Delete this post?')) return;
  bridge.deleteWallPost(postId, currentProfileId).then(function () {
    for (var i = 0; i < wallPosts.length; i++) {
      if (wallPosts[i].postId === postId) {
        wallPosts.splice(i, 1);
        break;
      }
    }
    var tc = document.getElementById('tabContent');
    if (tc && currentTab === 'wall') renderWall(tc);
  }).catch(function (err) {
    alert('Failed to delete: ' + err.message);
  });
}

function doLookup() {
  var input = document.getElementById('lookupInput');
  var userId = input ? input.value.trim() : '';
  if (userId) loadProfile(userId);
}

function doAddFriend(userId) {
  bridge.addFriend({ userId: userId }).then(function () {
    alert('Friend request sent!');
  }).catch(function (err) {
    alert('Failed: ' + err.message);
  });
}
</script>
</body>
</html>
