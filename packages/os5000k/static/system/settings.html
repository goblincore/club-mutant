<style>body{background:#111;color:#fff;user-select:none;text-align:center;font-size:13px}
#wp{max-width:120px;max-height:60px;margin:4px auto;display:none;border:1px solid #555}
.wbtn{background:#333;color:#fff;border:1px solid #555;padding:2px 8px;margin:2px;cursor:pointer;font-size:11px}
.wbtn:hover{background:#555}
</style>
Volume <input type=range id=V oninput=s() style=width:99>
Music <input type=range id=M oninput=s() style=width:99><p>
System Sounds <input type=checkbox id=Y oninput=s()>
Speech <input type=checkbox id=S oninput=s()>
Popups <input type=checkbox id=P oninput=s()>
<br><br>Background
<input id=C type=color oninput=s()>
<input id=D type=color oninput=s()>
<input id=T oninput=s()>
<br><br>Wallpaper
<input type=file id=W accept="image/*" style=display:none>
<button class=wbtn onclick=W.click()>Choose Image</button>
<button class=wbtn id=WC onclick=clearWallpaper()>Clear</button>
<br><img id=wp>
<p>Filters
<span id=F><script>

var wallpaper = '';

// save settings and rebuild
s = e=>parent.OS13k.SaveSettings
(
    V.value / 100,  // volume
    M.value / 100,  // music volume
    S.checked,      // speech
    P.checked,      // system sounds
    Y.checked,      // popups
    D.value,        // color 1
    C.value,        // color 2
    T.value,        // background text
    t,              // filter
    wallpaper,      // wallpaper
    F.innerHTML = '',                         // init filters
    [   ['Default',  ''],
        ['Gray',     'grayscale('],
        ['Game Boy', 'sepia()hue-rotate(40deg)contrast(.8)brightness(.8'],
        ['Ocean',    'invert()sepia()invert('],
        ['Sepia',    'sepia('],
        ['Fruity',   'saturate(9',]
    ].map(e=>                                 // rebuilld filters
        F.innerHTML +=                        // add to html
        `<button style='border:5px solid${    // create button
            e[1] == t ? '#f00' : '#111'       // selected color
            }'onmousedown=s(t='${ e[1] }')>`  // set filter
            + e[0]                            // set button text
    )
);

function showPreview() {
    if (wallpaper) { wp.src = wallpaper; wp.style.display = 'block'; }
    else { wp.style.display = 'none'; }
}

function clearWallpaper() {
    wallpaper = '';
    W.value = '';
    showPreview();
    s();
}

// handle file selection
W.onchange = function() {
    var file = W.files[0];
    if (!file) return;
    // limit to 500KB
    if (file.size > 512000) {
        alert('Image too large (max 500KB). Try a smaller or more compressed image.');
        W.value = '';
        return;
    }
    var reader = new FileReader();
    reader.onload = function(e) {
        wallpaper = e.target.result;
        showPreview();
        s();
    };
    reader.readAsDataURL(file);
};

// build settings
s(
    i = parent.OS13k.Settings(),  // load settings
    V.value   = i.v * 100,        // volume
    M.value   = i.m * 100,        // music volume
    S.checked = i.s,              // speech
    P.checked = i.p,              // popups
    Y.checked = i.o,              // system sounds
    C.value   = i.d,              // color 1
    D.value   = i.c,              // color 2
    T.value   = i.t,              // background text
    wallpaper = i.w || '',        // wallpaper
    t = i.f || 0                  // filter
);
showPreview();

</script>
